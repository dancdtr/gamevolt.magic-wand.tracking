---
name: "potter.wand-server"
is_dev: False

logging:
  file_path: ./Logs/potter.wand-server.{timestamp}.log
  minimum_level: "DEBUG"

zones:
  udp_receiver:
    host: "0.0.0.0"
    port: 5005
    max_size: 65556
    recv_timeout_s: 2

  zones:
    - id: Z001
      spells: [RICTUSEMPRA]
    - id: Z002
      spells: [REPARO]
    - id: Z003
      spells: [PEPPER_BREATH]
    - id: Z004
      spells: [APARECIUM]
    - id: Z005
      spells: [CANTIS]
    - id: Z006
      spells: [LUMOS_MAXIMA, NOX]
    - id: Z301
      spells: [LUMOS_MAXIMA, NOX]

anchor_area_manager:
  anchor_areas:
    - id: A001
      zone_ids: ["Z001"]
    - id: A002
      zone_ids: ["Z002"]
    - id: A003
      zone_ids: ["Z003", "Z006"]
    - id: A004
      zone_ids: ["Z004", "Z005"]
    - id: A301
      zone_ids: ["Z301"]

input:
  tracked_wands:
    ids:
      - "E000"
      - "E001"
      - "E002"
      - "E003"
      - "E004"
      - "E005"
      - "E006"
      - "E007"
      - "E008"
      - "E009"
      - "E010"
      - "E300"
    pinned_zones: []

  input_type: "wand"
  mock:
    invert_x: False
    invert_y: False
    sample_frequency: 30

  wand:
    active_reminder_interval: 1.3
    rmf:
      invert_x: True
      invert_y: True
      abs_invert_x: True
      abs_invert_y: True
      gain_x: 1.0
      gain_y: 1.0
      abs_yaw_limit_deg: 179
      abs_pitch_limit_deg: 179
      abs_clip_mode: "DISCARD"
      deadzone_x: 0.0
      deadzone_y: 0.0
      keep_absolute: True
      tiny_angle: 0
      world_up: "Z"

server:
  filter_wands: false
  filtered_wand_ids: []
  disconnect_after_s: 2.0
  header_ttl_s: 2.0
  web_socket:
    select_interval: 0.1
    web_socket:
      host: "0.0.0.0"
      port: 60901
motion:
  gesture_history:
    max_segments: 20
    max_age: 3
  processor:
    phase_tracker:
      speed_start: 0.50
      speed_stop: 0.20
      min_state_duration: 0.03
      min_paused_duration: 0.3
      min_holding_duration: 0.8
      min_stopped_duration: 1.2
    direction_quantizer:
      speed_stop: 0.2
      min_direction_duration: 0.01
      axis_deadband_per_s: 0.1
    segment_builder:
      max_sample_count: 256

wand_visualiser:
  is_enabled: True
  visualiser:
    root:
      title: "Wand Input"
      width: 500
      height: 500
      buffer: 100
    canvas:
      background_colour: "#222"
      highlight_thickness: 0
  label:
    text: ""
    foreground_colour: "#ddd"
    background_colour: "#111"
    side: "bottom"
    fill: "x"
  axes:
    show_axes: True
    colour: "#9ca3af"
    width: 1
  trail:
    scale: 0.2
    line_width: 3
    point_radius: 3
    max_points: 64
    draw_points: True
    smooth: False
    coords_mode: "centred"
    y_up: True
    clip_to_bounds: True
    pixel_margin: 0

wand_colours:
  - "#00acc1"
  - "#fdd835"
  - "#e65c59"
  - "#7cb342"
  - "#fb8c00"
  - "#ca537f"
  - "#994aae"
  - "#888fbe"
  - "#1e88e5"
  - "#5e35b1"
  - "#039be5"
  - "#00897b"
  - "#43a047"
  - "#f4511e"
  - "#6d4c41"
  - "#546e7a"

accuracy:
  fudge: 10
  weights:
    step_count_weight: 0.7
    relative_group_distance_weight: 0.15
    relative_group_duration_weight: 0.15
    required_step_bias: 0.5

show_system_controller:
  show_system_udp_tx:
    host: "192.168.1.121"
    port: 6006

  lamp_udp_tx:
    host: "192.168.1.138"
    port: 8888

anchor_bridge:
  udp_transmitter:
    host: "127.0.0.1"
    port: 40100

zone_visualisation:
  visualiser:
    root:
      title: "Spell"
      width: 800
      height: 800
      buffer: 100
    canvas:
      background_colour: "#222"
      highlight_thickness: 0

spell_image_library:
  instruction:
    assets_dir: ["assets", "spells"]
    image_size: 500
    bg_colour: [255, 255, 255]
    icon_colour: [0, 0, 0]
  success:
    assets_dir: ["assets", "spells"]
    image_size: 500
    bg_colour: [0, 255, 0]
    icon_colour: [0, 0, 0]

spell_registry:
  spells:
    - [0, "none"]
    - [1, "revelio"]
    - [2, "locomotor"]
    - [3, "arresto_momentum"]
    - [4, "wingardium_leviosa"]
    - [5, "meteolojinx"]
    - [6, "colovaria"]
    - [7, "slugulus_erecto"]
    - [8, "ventus"]
    - [9, "rictusempra"]
    - [10, "reparo"]
    - [11, "piertotum_locomotor"]
    - [12, "alohomora"]
    - [13, "colloportus"]
    - [14, "silencio"]
    - [15, "incendio"]
    - [16, "inflatus"]
    - [17, "immobulus"]
    - [18, "aparecium"]
    - [19, "engorgio"]
    - [20, "switching"]
    - [21, "cantis"]
    - [22, "pepper_breath"]
    - [23, "vera_verto"]
    - [24, "densaugeo"]
    - [25, "horn_tongue"]
    - [26, "flipendo"]
    - [27, "expecto_patronum"]
    - [28, "lumos_maxima"]
    - [29, "herbivicius"]
    - [30, "nebulus"]
    - [31, "nox"]

wand_spell_cue_controller:
  wand_levels:
    - ["E000", "ADVANCED"]
    - ["E001", "BEGINNER"]
    - ["E002", "BEGINNER"]
    - ["E003", "BEGINNER"]
    - ["E004", "BEGINNER"]
    - ["E005", "BEGINNER"]
    - ["E006", "BEGINNER"]
    - ["E007", "BEGINNER"]
    - ["E008", "BEGINNER"]
    - ["E009", "INTERMEDIATE"]
    - ["E010", "ADVANCED"]

wand_device_controller:
  command_broadcast_interval: 0.05
  disable_wand_tx: True
  wand_chosen_haptic_cues: []
  # wand_chosen_haptic_cues: [93, 93]
  # active_reminder_haptic_cues: [73, 14]
  active_reminder_haptic_cues: [83]
  spell_cast_haptic_cues: [93, 14, 56]
  spell_under_cast_haptic_cues: [93, 14, 56]
