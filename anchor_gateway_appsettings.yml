---
name: "potter.anchor_gateway"

logging:
  file_path: ./Logs/potter.anchor_gateway.log
  minimum_level: "INFORMATION"

serial_receiver:
  port: "localhost"
  baud: 115200
  timeout: 3
  retry_interval: 2

web_socket_client:
  web_socket:
    host: "10.0.101.11"
    port: 25001
  reconnection_interval: 5
  timeout: 3
